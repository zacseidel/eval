name: Update Portfolio Data

on:
  schedule:
    # 7am MDT (UTC-6) on Tue & Fri — shifts to 6am MST in winter
    - cron: '0 13 * * 2,5'
  workflow_dispatch: # allow manual runs from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python scraper/main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ data/price_cache/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update portfolio data [skip ci]"
          git pull --rebase
          git push
